<script src="js/main.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const user = JSON.parse(localStorage.getItem('user'));

    if(user){

        const userName = document.getElementById('userName');
        const welcomeText = document.getElementById('welcomeText');
        const popupWelcome = document.getElementById('popupWelcome');

        if(userName){
            userName.textContent = user.name.toUpperCase();
        }

        if(welcomeText){
            welcomeText.textContent =
                'Hello, ' + user.name.toUpperCase();
        }

        if(popupWelcome){
            popupWelcome.textContent =
                'Hello, ' + user.name.toUpperCase();
        }
    }
});

function switchTab(tabName) {

    const allTabs = [
        'fees',
        'quiz',
        'internal',
        'admission',
        'result',
        'exam',
        'choice',
        'feedback',
        'extra',
        'profile'
    ];

    allTabs.forEach(tab => {

        const contentEl =
            document.getElementById('content-' + tab);

        const tabEl =
            document.getElementById('tab-' + tab);

        if(contentEl){
            contentEl.style.display = 'none';
        }

        if(tabEl){
            tabEl.classList.remove('active');
        }
    });

    const selectedContent =
        document.getElementById('content-' + tabName);

    const selectedTab =
        document.getElementById('tab-' + tabName);

    if(selectedContent){
        selectedContent.style.display = 'block';
    }

    if(selectedTab){
        selectedTab.classList.add('active');
    }
}

function closeWelcome(){

    const overlay =
        document.getElementById('welcomeOverlay');

    if(overlay){
        overlay.style.display = 'none';
    }
}
</script>
